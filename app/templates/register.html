{% extends "base.html" %}

{% block content %}
  <section class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7 col-xl-6">
        <div class="panel-card p-4 p-lg-5">
          <span class="eyebrow">Create account</span>
          <h1 class="section-heading mt-2">Create an account</h1>
          <p class="text-secondary mb-4">Register as a visitor or organizer to start using the system.</p>

          {% if errors %}
            <div class="alert alert-danger rounded-4">
              <ul class="mb-0">
                {% for error in errors %}
                  <li>{{ error }}</li>
                {% endfor %}
              </ul>
            </div>
          {% endif %}

          <form method="post" action="/auth/register">
            <input type="hidden" name="next" value="{{ next_url }}" />
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label">Full name</label>
                <input class="form-control form-control-lg rounded-4" type="text" name="full_name" value="{{ form_data.full_name }}" required />
              </div>
              <div class="col-12">
                <label class="form-label">Email address</label>
                <input class="form-control form-control-lg rounded-4" type="email" name="email" value="{{ form_data.email }}" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Password</label>
                <input class="form-control form-control-lg rounded-4" type="password" name="password" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Confirm password</label>
                <input class="form-control form-control-lg rounded-4" type="password" name="confirm_password" required />
              </div>
              <div class="col-12">
                <label class="form-label">Account type</label>
                <select class="form-select form-select-lg rounded-4" name="role" required>
                  <option value="user" {% if form_data.role == 'user' %}selected{% endif %}>User</option>
                  <option value="organizer" {% if form_data.role == 'organizer' %}selected{% endif %}>Organizer</option>
                </select>
              </div>
            </div>

            <button class="btn btn-primary btn-lg rounded-pill w-100 mt-4" type="submit">Create account</button>
          </form>

          <div class="small text-secondary mt-4">
            Already registered?
            <a class="text-link" href="/auth/login{% if next_url %}?next={{ next_url }}{% endif %}">Sign in</a>
          </div>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
