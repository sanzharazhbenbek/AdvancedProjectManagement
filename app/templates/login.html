{% extends "base.html" %}

{% block content %}
  <section class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-xl-5">
        <div class="panel-card p-4 p-lg-5">
          <span class="eyebrow">Account access</span>
          <h1 class="section-heading mt-2">Sign in</h1>
          <p class="text-secondary mb-4">Access your tickets, organizer workspace, or admin controls.</p>

          {% if errors %}
            <div class="alert alert-danger rounded-4">
              <ul class="mb-0">
                {% for error in errors %}
                  <li>{{ error }}</li>
                {% endfor %}
              </ul>
            </div>
          {% endif %}

          <form method="post" action="/auth/login">
            <input type="hidden" name="next" value="{{ next_url }}" />
            <div class="mb-3">
              <label class="form-label">Email address</label>
              <input class="form-control form-control-lg rounded-4" type="email" name="email" value="{{ form_data.email }}" required />
            </div>
            <div class="mb-4">
              <label class="form-label">Password</label>
              <input class="form-control form-control-lg rounded-4" type="password" name="password" required />
            </div>
            <button class="btn btn-primary btn-lg rounded-pill w-100" type="submit">Sign in</button>
          </form>

          <div class="small text-secondary mt-4">
            No account yet?
            <a class="text-link" href="/auth/register{% if next_url %}?next={{ next_url }}{% endif %}">Create one here</a>
          </div>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
